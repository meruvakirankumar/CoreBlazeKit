name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.2.0) — leave blank to read from csproj'
        required: false

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test-publish:
    name: Build · Test · Pack · Push
    runs-on: ubuntu-latest
    environment: nuget-prod

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity minimal

      - name: Resolve package version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            VER=$(grep -m1 '<Version>' \
              src/CoreBlaze.Components/CoreBlaze.Components.csproj \
              | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
            echo "VERSION=$VER" >> $GITHUB_OUTPUT
          fi

      - name: Pack NuGet packages
        run: |
          dotnet pack src/CoreBlaze.Components/CoreBlaze.Components.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkg \
            /p:Version=${{ steps.version.outputs.VERSION }} \
            /p:ContinuousIntegrationBuild=true

      - name: List generated packages
        run: ls -lh ./nupkg

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ steps.version.outputs.VERSION }}
          path: ./nupkg/*.nupkg
          retention-days: 14

      - name: Push .nupkg to NuGet.org
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push .snupkg symbols to NuGet.org
        run: |
          dotnet nuget push "./nupkg/*.snupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
