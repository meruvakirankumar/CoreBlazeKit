name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.2.0) — leave blank to read from csproj'
        required: false

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test-publish:
    name: Build · Test · Pack · Push
    runs-on: ubuntu-latest

    # Must match the Environment name you set in NuGet Trusted Publishers form
    environment: nuget-prod

    # Required for NuGet Trusted Publishing (OIDC — no API key secret needed)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity minimal

      - name: Resolve package version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            VER=$(grep -m1 '<Version>' \
              src/CoreBlaze.Components/CoreBlaze.Components.csproj \
              | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
            echo "VERSION=$VER" >> $GITHUB_OUTPUT
          fi

      - name: Pack NuGet packages
        run: |
          dotnet pack src/CoreBlaze.Components/CoreBlaze.Components.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkg \
            /p:Version=${{ steps.version.outputs.VERSION }} \
            /p:ContinuousIntegrationBuild=true

      - name: List generated packages
        run: ls -lh ./nupkg

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ steps.version.outputs.VERSION }}
          path: ./nupkg/*.nupkg
          retention-days: 14

      # ── Trusted Publishing (OIDC) ─────────────────────────────────────
      # NuGet.org validates the GitHub OIDC token against the Trusted Publisher
      # policy you configured at nuget.org/account/TrustedPublishers.
      # No NUGET_API_KEY secret is required.
      - name: Get NuGet API token via Trusted Publishing (OIDC)
        id: nuget-token
        run: |
          # Request GitHub OIDC token with NuGet audience
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value')

          # Exchange OIDC token for a short-lived NuGet API key
          NUGET_KEY=$(curl -sS -X POST \
            "https://www.nuget.org/api/v1/authenticate" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            | jq -r '.apiKey // empty')

          if [ -z "$NUGET_KEY" ]; then
            echo "::error::Failed to obtain NuGet token via Trusted Publishing. Check the policy on nuget.org."
            exit 1
          fi

          echo "::add-mask::$NUGET_KEY"
          echo "api_key=$NUGET_KEY" >> "$GITHUB_OUTPUT"

      - name: Push .nupkg to NuGet.org
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --api-key "${{ steps.nuget-token.outputs.api_key }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push .snupkg symbols to NuGet.org
        run: |
          dotnet nuget push "./nupkg/*.snupkg" \
            --api-key "${{ steps.nuget-token.outputs.api_key }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
